<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://stratexim.com/cz">
    <link rel="canonical" href="https://stratexim.com/cz">
    <title>STRATEXIM — Přesměrování</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        .container {
            padding: 2rem;
        }
        .logo {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 2.5rem;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(59, 130, 246, 0.15);
            border-top-color: #3b82f6;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.75rem;
        }
        .link a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }
        .link a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">STRATEXIM</div>
        <div class="spinner"></div>
        <p class="message">Přesměrování na stratexim.com</p>
        <p class="link"><a href="https://stratexim.com/cz">Pokračovat ručně &rarr;</a></p>
    </div>
</body>
</html>
